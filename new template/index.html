<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="IRISTEM">
  <meta name="description" content="IRISTEM is currently undergoing major website updates.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="shortcut icon" href="/favicon.ico">
  <title>IRISTEM | Website Updates</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #11221d;
      --muted: #51645d;
      --line: rgba(17, 34, 29, 0.14);
      --leaf-dark: #1f5f49;
      --sun: #f4c15d;
      --sky: #e7f3ef;
      --paper: #fffaf0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 18%, rgba(244, 193, 93, 0.38), transparent 24rem),
        radial-gradient(circle at 84% 12%, rgba(45, 125, 95, 0.22), transparent 24rem),
        linear-gradient(135deg, var(--paper), var(--sky));
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(1.5rem, 4vw, 4rem);
      position: relative;
      overflow: hidden;
    }

    .page::before,
    .page::after {
      content: "";
      position: absolute;
      border: 1px solid var(--line);
      transform: rotate(-12deg);
      pointer-events: none;
    }

    .page::before {
      width: 34rem;
      height: 34rem;
      right: -18rem;
      bottom: -17rem;
      border-radius: 42% 58% 50% 50%;
      background: rgba(255, 255, 255, 0.3);
    }

    .page::after {
      width: 18rem;
      height: 18rem;
      left: -10rem;
      top: 20%;
      border-radius: 58% 42% 48% 52%;
      background: rgba(45, 125, 95, 0.08);
    }

    .maintenance {
      width: min(100%, 44rem);
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.55rem 0.8rem;
      border: 1px solid rgba(31, 95, 73, 0.2);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.6);
      color: var(--leaf-dark);
      font-size: 0.86rem;
      font-weight: 700;
      margin-bottom: 1.4rem;
    }

    .status::before {
      content: "";
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 999px;
      background: var(--sun);
      box-shadow: 0 0 0 0.35rem rgba(244, 193, 93, 0.2);
    }

    h1 {
      margin: 0 auto;
      font-size: clamp(3.5rem, 10vw, 7.5rem);
      line-height: 0.9;
      letter-spacing: 0;
    }

    .copy {
      max-width: 39rem;
      margin: 1.7rem 0 0;
      color: var(--muted);
      font-size: clamp(1.05rem, 2.2vw, 1.35rem);
      line-height: 1.65;
    }

    .note {
      margin-top: 2rem;
      color: var(--leaf-dark);
      font-size: 0.95rem;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      .page {
        min-height: 100svh;
      }

      h1 {
        font-size: clamp(3rem, 17vw, 4.75rem);
      }
    }
  </style>
</head>
<body>
  <main class="page" aria-labelledby="page-title">
    <section class="maintenance">
      <div class="status">Website update in progress</div>
      <h1 id="page-title">Major changes underway.</h1>
      <p class="copy">
        Our website is getting rebuilt right now. We will be back soon with updated programs,
        chapter information, and ways to get involved.
      </p>
      <p class="note">Thanks for your patience while we make these updates.</p>
    </section>
  </main>
</body>
</html>
