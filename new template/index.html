<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="IRISTEM">
  <meta name="description" content="IRISTEM is currently undergoing major website updates.">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="shortcut icon" href="/favicon.ico">
  <title>IRISTEM | Website Updates</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #11221d;
      --muted: #51645d;
      --line: rgba(17, 34, 29, 0.14);
      --leaf: #2d7d5f;
      --leaf-dark: #1f5f49;
      --sun: #f4c15d;
      --sky: #e7f3ef;
      --paper: #fffaf0;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 18%, rgba(244, 193, 93, 0.38), transparent 24rem),
        radial-gradient(circle at 84% 12%, rgba(45, 125, 95, 0.22), transparent 24rem),
        linear-gradient(135deg, var(--paper), var(--sky));
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(1.5rem, 4vw, 4rem);
      position: relative;
      overflow: hidden;
    }

    .page::before,
    .page::after {
      content: "";
      position: absolute;
      border: 1px solid var(--line);
      transform: rotate(-12deg);
      pointer-events: none;
    }

    .page::before {
      width: 34rem;
      height: 34rem;
      right: -18rem;
      bottom: -17rem;
      border-radius: 42% 58% 50% 50%;
      background: rgba(255, 255, 255, 0.3);
    }

    .page::after {
      width: 18rem;
      height: 18rem;
      left: -10rem;
      top: 20%;
      border-radius: 58% 42% 48% 52%;
      background: rgba(45, 125, 95, 0.08);
    }

    .maintenance {
      width: min(100%, 58rem);
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(16rem, 0.8fr);
      gap: clamp(2rem, 5vw, 4rem);
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.85rem;
      margin-bottom: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand img {
      width: 3rem;
      height: 3rem;
      object-fit: contain;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.55rem 0.8rem;
      border: 1px solid rgba(31, 95, 73, 0.2);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.6);
      color: var(--leaf-dark);
      font-size: 0.86rem;
      font-weight: 700;
      margin-bottom: 1.4rem;
    }

    .status::before {
      content: "";
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 999px;
      background: var(--sun);
      box-shadow: 0 0 0 0.35rem rgba(244, 193, 93, 0.2);
    }

    h1 {
      max-width: 12ch;
      margin: 0;
      font-size: clamp(3.5rem, 10vw, 7.5rem);
      line-height: 0.9;
      letter-spacing: 0;
    }

    .copy {
      max-width: 39rem;
      margin: 1.7rem 0 0;
      color: var(--muted);
      font-size: clamp(1.05rem, 2.2vw, 1.35rem);
      line-height: 1.65;
    }

    .note {
      margin-top: 2rem;
      color: var(--leaf-dark);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .visual {
      min-height: 28rem;
      display: grid;
      place-items: center;
      position: relative;
    }

    .orbital {
      width: min(100%, 22rem);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid rgba(17, 34, 29, 0.13);
      display: grid;
      place-items: center;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0.46)),
        repeating-linear-gradient(90deg, transparent 0 1.35rem, rgba(45, 125, 95, 0.08) 1.35rem 1.42rem);
      box-shadow: 0 2rem 5rem rgba(31, 95, 73, 0.16);
    }

    .mark {
      width: 9.5rem;
      height: 9.5rem;
      display: grid;
      place-items: center;
      border-radius: 2rem;
      background: var(--white);
      box-shadow: 0 1.2rem 3rem rgba(17, 34, 29, 0.12);
      transform: rotate(-4deg);
    }

    .mark img {
      width: 6.5rem;
      height: 6.5rem;
      object-fit: contain;
    }

    .pill {
      position: absolute;
      padding: 0.75rem 0.9rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      color: var(--leaf-dark);
      font-size: 0.82rem;
      font-weight: 800;
      box-shadow: 0 1rem 2.4rem rgba(17, 34, 29, 0.08);
    }

    .pill:nth-child(2) {
      top: 11%;
      right: 3%;
    }

    .pill:nth-child(3) {
      left: 0;
      bottom: 18%;
    }

    .pill:nth-child(4) {
      right: 10%;
      bottom: 5%;
      color: #8a641f;
    }

    @media (max-width: 760px) {
      .page {
        place-items: start center;
        min-height: 100svh;
      }

      .maintenance {
        grid-template-columns: 1fr;
      }

      .brand {
        margin-bottom: 3rem;
      }

      h1 {
        font-size: clamp(3rem, 17vw, 4.75rem);
      }

      .visual {
        min-height: 17rem;
      }

      .orbital {
        width: min(100%, 16rem);
      }

      .mark {
        width: 7.5rem;
        height: 7.5rem;
        border-radius: 1.5rem;
      }

      .mark img {
        width: 5rem;
        height: 5rem;
      }

      .pill {
        font-size: 0.74rem;
      }
    }
  </style>
</head>
<body>
  <main class="page" aria-labelledby="page-title">
    <section class="maintenance">
      <div>
        <a class="brand" href="/" aria-label="IRISTEM home">
          <img src="img/logo.png" alt="">
          <span>IRISTEM</span>
        </a>
        <div class="status">Website update in progress</div>
        <h1 id="page-title">Major changes underway.</h1>
        <p class="copy">
          Our website is getting rebuilt right now. We will be back soon with updated programs,
          chapter information, and ways to get involved.
        </p>
        <p class="note">Thanks for your patience while we make these updates.</p>
      </div>

      <div class="visual" aria-hidden="true">
        <div class="orbital">
          <div class="mark">
            <img src="img/logo.png" alt="">
          </div>
        </div>
        <div class="pill">Research</div>
        <div class="pill">STEM education</div>
        <div class="pill">Community impact</div>
      </div>
    </section>
  </main>
</body>
</html>
